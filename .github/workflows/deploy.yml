name: Build and Deploy to Aliyun

on:
  push:
    branches:
      - master
  workflow_dispatch:  # 允许手动触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装依赖
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 3. 构建项目
      - name: Build VitePress site
        run: pnpm run build

      # 4. 部署到阿里云服务器（使用 rsync）
      - name: Deploy to Aliyun server
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_TARGET_DIR: ${{ secrets.REMOTE_TARGET_DIR }}
        run: |
          # 设置 SSH 密钥
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

          # 使用 rsync 同步文件（增量传输 + 压缩 + 显示进度）
          rsync -avz --delete --no-o --no-g \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            docs/.vitepress/dist/ "$REMOTE_USER@$REMOTE_HOST:$REMOTE_TARGET_DIR/"

          echo "✅ 部署成功！"
